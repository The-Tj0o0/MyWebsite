<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Tj | Chilling</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap');

        /* Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* Winter Background Image */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            filter: brightness(0.4);
            z-index: -2;
        }

        /* Snow Overlay Animation */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.3;
            animation: snowFall 20s linear infinite;
        }

        @keyframes snowFall {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        /* Click to Enter Screen */
        #enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #enter-screen h1 {
            font-family: 'Courier Prime', monospace;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px #fff; }
            50% { opacity: 0.3; text-shadow: 0 0 0px #fff; }
        }

        /* Main Content Container */
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Glassmorphism Profile Card */
        .card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 45px;
            width: 340px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Profile GIF */
        .pfp {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .pfp:hover {
            transform: rotate(5deg) scale(1.1);
        }

        /* Typography */
        .username {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .typewriter-container {
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 30px;
            height: 40px; 
        }

        /* Social Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .link-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        .views {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="snow"></div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

    <div id="enter-screen" onclick="enterSite()">
        <h1>[ click ]</h1>
    </div>

    <div id="main-content">
        <div class="card">
            <img src="gun.gif" alt="pfp" class="pfp">
            
            <h2 class="username">Tj</h2>
            
            <div class="typewriter-container">
                <span id="typed-text"></span><span class="cursor">_</span>
            </div>

            <div class="links">
                <a href="https://discord.gg/jYtzGA4wmk" class="link-btn">Discord</a>
                <a href="https://github.com/The-Tj0o0" class="link-btn">GitHub</a>
            </div>

            <div class="views">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <span id="view-count">0</span>
            </div>
        </div>
    </div>

    <script>
        const textToType = "winter is calm.\nstay calm and enjoy the vibe.";
        const typingSpeed = 60; 
        
        let i = 0;
        const textElement = document.getElementById("typed-text");

        function enterSite() {
            const enterScreen = document.getElementById("enter-screen");
            const mainContent = document.getElementById("main-content");
            const audio = document.getElementById("bg-music");

            audio.volume = 0.3;
            audio.play();

            enterScreen.style.opacity = '0';
            
            setTimeout(() => {
                enterScreen.style.display = 'none';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
                setTimeout(typeWriter, 400);
            }, 800);
        }

        function typeWriter() {
            if (i < textToType.length) {
                if (textToType.charAt(i) === '\n') {
                    textElement.innerHTML += '<br>';
                } else {
                    textElement.innerHTML += textToType.charAt(i);
                }
                i++;
                setTimeout(typeWriter, typingSpeed);
            }
        }

        // Set fake view count
        document.getElementById('view-count').innerText = String("The Eye");
    </script>
</body>
</html>
