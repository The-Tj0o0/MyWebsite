<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tj | Skills</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Winter Background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            filter: brightness(0.3);
            z-index: -2;
        }

        /* Snow Animation */
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            opacity: 0.2;
            animation: snowFall 25s linear infinite;
        }

        @keyframes snowFall {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* Glass Card */
        .skills-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
        }

        .header-gif {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            font-family: 'Courier Prime', monospace;
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Skills Layout */
        .skill-wrapper {
            text-align: left;
            margin-bottom: 20px;
        }

        .skill-label {
            display: flex;
            justify-content: space-between;
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #ccc;
        }

        .progress-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fff, #70a1ff);
            box-shadow: 0 0 15px rgba(112, 161, 255, 0.6);
            border-radius: 10px;
            width: 0%; /* Start at 0 for animation */
            transition: width 2s cubic-bezier(0.1, 0.5, 0.1, 1);
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            font-family: 'Courier Prime', monospace;
            transition: 0.3s;
            border: 1px solid transparent;
            padding: 5px 15px;
        }

        .back-btn:hover {
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="snow"></div>

    <div class="container">
        <div class="skills-card">
            <img src="gun.gif" alt="tj-pfp" class="header-gif">
            <h2>Abilities</h2>

            <div class="skill-wrapper">
                <div class="skill-label">
                    <span>Development</span>
                    <span>85%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" data-width="85%"></div>
                </div>
            </div>

            <div class="skill-wrapper">
                <div class="skill-label">
                    <span>Gaming</span>
                    <span>95%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" data-width="95%"></div>
                </div>
            </div>

            <div class="skill-wrapper">
                <div class="skill-label">
                    <span>Creative Design</span>
                    <span>70%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" data-width="70%"></div>
                </div>
            </div>

            <div class="skill-wrapper">
                <div class="skill-label">
                    <span>Communication</span>
                    <span>80%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" data-width="80%"></div>
                </div>
            </div>

            <a href="https://the-tj0o0.github.io/MyWebsite/" class="back-btn">[ go back ]</a>
        </div>
    </div>

    <script>
        // Trigger progress bar animation on load
        window.onload = () => {
            const bars = document.querySelectorAll('.progress-fill');
            bars.forEach(bar => {
                const width = bar.getAttribute('data-width');
                setTimeout(() => {
                    bar.style.width = width;
                }, 300);
            });
        };
    </script>

</body>
</html>
